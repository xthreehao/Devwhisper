<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle/rounded-rect with glassmorphic aura -->
  <rect width="48" height="48" rx="12" fill="#aa3bff" fill-opacity="0.08"/>
  <rect width="46" height="46" x="1" y="1" rx="11" stroke="#aa3bff" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Microphone & Sound Waves -->
  <!-- Microphone Body -->
  <rect x="20" y="12" width="8" height="14" rx="4" fill="url(#mic-grad)"/>
  
  <!-- Stand -->
  <path d="M15 19C15 25 33 25 33 19" stroke="url(#mic-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M24 24.5V32" stroke="url(#mic-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M19 32H29" stroke="url(#mic-grad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Soundwaves -->
  <path d="M9 16C9 14.5 10 14.5 10 16V22C10 23.5 9 23.5 9 22V16Z" fill="#aa3bff" fill-opacity="0.7"/>
  <path d="M5 18C5 17 6 17 6 18V20C6 21 5 21 5 20V18Z" fill="#aa3bff" fill-opacity="0.4"/>
  <path d="M39 16C39 14.5 38 14.5 38 16V22C38 23.5 39 23.5 39 22V16Z" fill="#aa3bff" fill-opacity="0.7"/>
  <path d="M43 18C43 17 42 17 42 18V20C42 21 43 21 43 20V18Z" fill="#aa3bff" fill-opacity="0.4"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="mic-grad" x1="20" y1="12" x2="28" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#aa3bff"/>
    </linearGradient>
  </defs>
</svg>